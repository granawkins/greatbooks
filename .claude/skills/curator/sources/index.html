th.on .arr { color: var(--accent); }
td { padding: 6px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:hover td { background: #fdfcfa; }
.done td { background: var(--green-bg); }
.done:hover td { background: #e5fbe9; }
.y { color: var(--green); font-weight: 600; }
.n { color: #ccc; }

const COLS = [
  {k:'t',   l:'Title',    vis:1, sort:1},
  {k:'a',   l:'Author',   vis:1, sort:1},
  {k:'yl',  l:'Year',     vis:1, sort:1, sk:'y'},
  {k:'cat', l:'Category', vis:1, sort:1},
  {k:'pg',  l:'Pages',    vis:1, sort:1, fmt:'num'},
  {k:'gr',  l:'Rating',   vis:1, sort:1, fmt:'rating'},
  {k:'grn', l:'# Rated',  vis:1, sort:1, fmt:'num'},
  {k:'s',   l:'Source',   vis:1, sort:0},
  {k:'T',   l:'Text',     vis:1, sort:1, bool:1},
  {k:'A',   l:'Audio',    vis:1, sort:1, bool:1},
  {k:'R',   l:'Research', vis:1, sort:1, bool:1},
  {k:'G',   l:'Guide',    vis:1, sort:1, bool:1},
];

const CATS = ['Ancient World','Philosophy','Politics & Society','Classic Novel','Modern Fiction','Adventure','Drama','Essays & Ideas'];

const FILTERS = [
  {k:'T', l:'Has Text'}, {k:'A', l:'Has Audio'}, {k:'R', l:'Has Research'},
  {k:'G', l:'Has Guide'}, {k:'todo', l:'Todo (no text)'},
  ...CATS.map(c => ({k:'cat:'+c, l:c})),
];

let sc = 'y', sd = 1, sq = '', sf = null;
const $ = id => document.getElementById(id);

function render() {
  let f = BOOKS.filter(b => {
    if (sq && !(b.t+' '+b.a).toLowerCase().includes(sq)) return false;
    if (!sf) return true;
    if (sf === 'todo') return !b.T;
    if (sf.startsWith('cat:')) return b.cat === sf.slice(4);
    return !!b[sf];
  });
  f.sort((a,b) => {
    const k = COLS.find(c=>c.k===sc)?.sk || sc;
    let va=a[k]??'', vb=b[k]??'';
    if (typeof va==='number'&&typeof vb==='number') return (va-vb)*sd;
    return String(va).localeCompare(String(vb))*sd;
  });

  const done = f.filter(b=>b.T).length;
  $('stats').textContent = `${f.length} books, ${done} with text`;

  $('th').innerHTML = COLS.map(c => {
    const on = sc===c.k||sc===c.sk;
    return `<th class="${on?'on':''}" data-k="${c.k}">${c.l}<span class="arr">${on?(sd>0?'▲':'▼'):'▸'}</span></th>`;
  }).join('');

  $('tb').innerHTML = f.map(b =>
    `<tr class="${b.T?'done':''}">` + COLS.map(c => {
      if (c.bool) return `<td>${b[c.k]?'<span class="y">✓</span>':'<span class="n">·</span>'}</td>`;
      if (c.k==='s'&&b.s) {
        const label = b.s.includes('gutenberg')?'PG':b.s.includes('mit.edu')?'MIT':b.s.includes('standardebooks')?'SE':b.s.includes('archive.org')?'IA':'link';
        return `<td><a href="${b.s}" target="_blank" style="color:var(--accent)">${label}</a></td>`;
      }
      if (c.k==='cat') return `<td class="cat">${b.cat||''}</td>`;
      if (c.k==='pg') return `<td>${b.pg?b.pg+'p':''}</td>`;
      if (c.fmt==='num'&&b[c.k]) return `<td>${Number(b[c.k]).toLocaleString()}</td>`;
      return `<td>${b[c.k]??''}</td>`;
    }).join('') + '</tr>'
  ).join('');

  const h = document.querySelector('.sticky-header').offsetHeight;
  document.documentElement.style.setProperty('--hh', h+'px');
}

function renderFilters() {
  $('filters').innerHTML = FILTERS.map(f =>
    `<span class="pill${sf===f.k?' active':''}" data-f="${f.k}">${f.l}</span>`
  ).join('');
}

$('q').addEventListener('input', e => { sq = e.target.value.toLowerCase(); render(); });
$('th').addEventListener('click', e => {
  const th = e.target.closest('th'); if (!th) return;
  const c = COLS.find(c=>c.k===th.dataset.k); if (!c||!c.sort) return;
  const nk = c.sk||c.k;
  if (sc===nk) sd*=-1; else { sc=nk; sd=1; }
  render();
});
$('filters').addEventListener('click', e => {
  const p = e.target.closest('.pill'); if (!p) return;
  sf = sf===p.dataset.f ? null : p.dataset.f;
  renderFilters(); render();
});
window.addEventListener('resize', render);

renderFilters(); render();
</script>
